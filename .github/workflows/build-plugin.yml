name: Build Plugin Bundle

on:
  push:
    branches: [main, master]
    paths:
      - 'plugin/src/**'
      - 'plugin/package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: plugin
        run: npm ci

      - name: Build bundle
        working-directory: plugin
        run: npm run build

      - name: Commit bundle if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin/dist/index.mjs
          git diff --staged --quiet || git commit -m "build: update plugin bundle"
          git push
